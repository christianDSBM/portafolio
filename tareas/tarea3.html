<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarea 3 | Evidencias</title>
  <link rel="stylesheet" href="../assets/style.css" />
  
  <style>
    /* Estilos específicos para el carrusel */
    .carousel-container {
      position: relative;
      max-width: 900px;
      margin: 2rem auto;
      background-color: #1e1e1e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .carousel-slide {
      display: none; /* Oculta todas las imágenes por defecto */
      text-align: center;
    }

    /* Imagen en grande y responsiva */
    .carousel-slide img {
      width: 100%;
      max-height: 70vh;
      object-fit: contain; 
      display: block;
    }

    /* Botones de navegación (Flechas) */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: auto;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 24px;
      background-color: rgba(0,0,0,0.5);
      border: none;
      border-radius: 0 4px 4px 0;
      user-select: none;
      transition: 0.3s ease;
    }

    .next {
      right: 0;
      border-radius: 4px 0 0 4px;
    }

    .prev:hover, .next:hover {
      background-color: rgba(0,0,0,0.9);
    }

    /* Botón para regresar al inicio */
    .back-btn-container {
      text-align: center;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #4CAF50; /* Cambia este color según la paleta de tu sitio */
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .back-btn:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header">
      <h1 class="header-title">Evidencias: Tarea 3</h1>
      <p class="header-subtitle">Galería de pruebas del funcionamiento</p>
    </section>

    <div class="carousel-container">
      
      <div class="carousel-slide">
        <img src="../assets/evidence3-1.png" alt="Prueba 1">
      </div>

      <div class="carousel-slide">
        <img src="../assets/evidence3-2.png" alt="Prueba 2">
      </div>

      <div class="carousel-slide">
        <img src="../assets/evidence3-3.png" alt="Prueba 3">
      </div>
      
      <div class="carousel-slide">
        <img src="../assets/evidence3-4.png" alt="Prueba 3">
      </div>

      <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <div class="back-btn-container">
      <a href="../index.html" class="back-btn">⬅ Regresar al inicio</a>
    </div>

  </main>

  <script>
    let slideIndex = 0;
    const slides = document.querySelectorAll('.carousel-slide');

    function showSlide(index) {
      // Si llegamos al final, volvemos a la primera imagen
      if (index >= slides.length) { slideIndex = 0; }
      // Si retrocedemos desde la primera, vamos a la última
      if (index < 0) { slideIndex = slides.length - 1; }
      
      // Ocultamos todas las imágenes
      slides.forEach(slide => {
        slide.style.display = "none";
      });
      
      // Mostramos solo la imagen activa
      slides[slideIndex].style.display = "block";
    }

    function changeSlide(n) {
      slideIndex += n;
      showSlide(slideIndex);
    }

    // Inicializamos el carrusel mostrando la primera imagen al cargar la página
    showSlide(slideIndex);
  </script>
</body>
</html>
